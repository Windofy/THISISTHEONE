steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '--platform=linux/amd64'
      - '--no-cache'
      - '-t'
      - 'europe-west4-docker.pkg.dev/windofy-core/mrj-builds/mrj526:latest'
      - '.'
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - 'europe-west4-docker.pkg.dev/windofy-core/mrj-builds/mrj526:latest'
images:
  - 'europe-west4-docker.pkg.dev/windofy-core/mrj-builds/mrj526:latest'
options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
